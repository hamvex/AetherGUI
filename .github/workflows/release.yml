name: Windows release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci
      - name: Fetch and verify Aether core
        run: npm run fetch:core
      - name: Fetch and verify routing engine
        run: npm run fetch:routing
      - name: Test frontend
        run: npm test
      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Build application and installers
        run: npm run build

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item src-tauri/target/release/bundle/nsis/*-setup.exe release/
          Copy-Item src-tauri/target/release/bundle/msi/*.msi release/
          Compress-Archive -Path src-tauri/target/release/aether-gui.exe,src-tauri/binaries/aether-x86_64-pc-windows-msvc.exe,src-tauri/binaries/sing-box-x86_64-pc-windows-msvc.exe -DestinationPath release/Firstham_AetherGui_1.5.0_x64-portable.zip
          Get-ChildItem release -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)" | Add-Content release/SHA256SUMS.txt
          }

      - uses: actions/upload-artifact@v4
        with:
          name: AetherGUI-windows-x64
          path: release/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            Firstham AetherGui — an independent, beginner-friendly Windows GUI for Aether.

            Includes built-in System-wide VPN Mode, full/local-bypass/split routing, DNS leak protection, explicit IPv6 handling, recovery tooling, and manual SOCKS5 mode. No V2RayN or Proxifier is required.
            The bundled Aether core and sing-box 1.13.14 TUN engine are fetched from their official releases and SHA-256 verified during the build.
            Windows x64 only. Unsigned binaries may trigger a SmartScreen warning.
